<script>
'use strict';

const INTERVALS = [1, 2, 4, 7, 15, 30];
const STORAGE_KEY = 'ebbinghaus_schedule_v2';
const STORAGE_KEY_LEGACY = 'ebbinghaus_schedule';

function parseLocalDate(str) {
  const parts = str.split('-').map(Number);
  return new Date(parts[0], parts[1] - 1, parts[2]);
}

function formatDate(d) {
  const w = ['日','一','二','三','四','五','六'];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 周${w[d.getDay()]}`;
}

function dateEqual(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── Shared AudioContext singleton ─────────────────────────
let _audioCtx = null;
function getAudioContext() {
  if (!_audioCtx) {
    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (_audioCtx.state === 'suspended') {
    _audioCtx.resume();
  }
  return _audioCtx;
}

function playStampSound() {
  try {
    const ctx = getAudioContext();
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'triangle';
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(150, now);
    osc.frequency.exponentialRampToValueAtTime(40, now + 0.12);
    gain.gain.setValueAtTime(0.35, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.18);
    osc.start(now);
    osc.stop(now + 0.18);
    const osc2 = ctx.createOscillator();
    const gain2 = ctx.createGain();
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(300, now);
    osc2.frequency.exponentialRampToValueAtTime(180, now + 0.08);
    osc2.connect(gain2);
    gain2.connect(ctx.destination);
    gain2.gain.setValueAtTime(0.08, now);
    gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
    osc2.start(now);
    osc2.stop(now + 0.12);
  } catch(e) { /* audio not available */ }
}

// ── Ambient Sound Engine ───────────────────────────────────
const AMBIENT_STORAGE = 'ebbinghaus_ambient';
let ambientType = 'none';
let ambientVolume = 0.4;
let ambientNodes = null;

function loadAmbientState() {
  try {
    const raw = localStorage.getItem(AMBIENT_STORAGE);
    return raw ? JSON.parse(raw) : { type: 'none', volume: 0.4 };
  } catch(e) { return { type: 'none', volume: 0.4 }; }
}

function saveAmbientState(state) {
  try { localStorage.setItem(AMBIENT_STORAGE, JSON.stringify(state)); }
  catch(e) {}
}

function createNoiseBuffer(duration) {
  const ctx = getAudioContext();
  const len = ctx.sampleRate * duration;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
  return buf;
}

function stopAmbient() {
  if (!ambientNodes) return;
  // Clear any running intervals
  if (ambientNodes.dropInterval) clearInterval(ambientNodes.dropInterval);
  if (ambientNodes.crackleInterval) clearInterval(ambientNodes.crackleInterval);
  // Fade out
  try { ambientNodes.gain.gain.linearRampToValueAtTime(0, getAudioContext().currentTime + 0.3); } catch(e) {}
  var nodes = ambientNodes;
  ambientNodes = null;
  setTimeout(function() {
    try {
      if (nodes.src) nodes.src.stop();
      if (nodes.lfo) { try { nodes.lfo.stop(); } catch(e) {} }
      Object.values(nodes).forEach(function(n) { try { n.disconnect(); } catch(e) {} });
    } catch(e) {}
  }, 350);
}

function startAmbient(type, volume) {
  stopAmbient();
  if (type === 'none') return;
  const ctx = getAudioContext();
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0, ctx.currentTime);
  gain.gain.linearRampToValueAtTime(volume * 0.7, ctx.currentTime + 0.5);
  gain.connect(ctx.destination);

  if (type === 'white') {
    // Simple white noise
    const buf = createNoiseBuffer(4);
    const src = ctx.createBufferSource();
    src.buffer = buf; src.loop = true;
    src.connect(gain);
    src.start();
    ambientNodes = { src, gain };
  } else if (type === 'rain') {
    // Rain: lowpass-filtered noise + random droplet clicks
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass'; filter.frequency.value = 2000;
    const buf = createNoiseBuffer(4);
    const src = ctx.createBufferSource();
    src.buffer = buf; src.loop = true;
    src.connect(filter); filter.connect(gain);
    src.start();

    // Droplet oscillator — short random pulses
    const dropGain = ctx.createGain();
    dropGain.gain.value = volume * 0.3;
    dropGain.connect(gain);
    const dropInterval = setInterval(function() {
      if (!ambientNodes) { clearInterval(dropInterval); return; }
      const osc = ctx.createOscillator();
      const dg = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 400 + Math.random() * 800;
      dg.gain.setValueAtTime(Math.random() * 0.15, ctx.currentTime);
      dg.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
      osc.connect(dg); dg.connect(dropGain);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.08);
    }, 200);
    ambientNodes = { src, gain, filter, dropGain, dropInterval };
  } else if (type === 'fire') {
    // Campfire: bandpass noise with amplitude modulation + crackles
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass'; filter.frequency.value = 400; filter.Q.value = 0.5;
    const buf = createNoiseBuffer(4);
    const src = ctx.createBufferSource();
    src.buffer = buf; src.loop = true;

    // Low-frequency oscillation for flicker
    const lfo = ctx.createOscillator();
    const lfoGain = ctx.createGain();
    lfo.type = 'sine'; lfo.frequency.value = 0.7;
    lfoGain.gain.value = 0.3;
    lfo.connect(lfoGain); lfoGain.connect(gain.gain);
    lfo.start();

    src.connect(filter); filter.connect(gain);
    src.start();

    // Crackles — short bursts of higher-freq noise
    const crackleGain = ctx.createGain();
    crackleGain.gain.value = volume * 0.25;
    crackleGain.connect(gain);
    const crackleInterval = setInterval(function() {
      if (!ambientNodes) { clearInterval(crackleInterval); return; }
      if (Math.random() < 0.4) {
        const cb = ctx.createBufferSource();
        const cn = createNoiseBuffer(0.08);
        cb.buffer = cn;
        const cg = ctx.createGain();
        cg.gain.setValueAtTime(Math.random() * 0.2, ctx.currentTime);
        cg.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
        cb.connect(cg); cg.connect(crackleGain);
        cb.start(ctx.currentTime);
        cb.stop(ctx.currentTime + 0.08);
      }
    }, 300);
    ambientNodes = { src, gain, filter, lfo, lfoGain, crackleGain, crackleInterval };
  }
}

// ── IndexedDB Audio Store ──────────────────────────────────
const AUDIO_DB_NAME = 'ebbinghaus_audio';
const AUDIO_STORE = 'files';
let audioDB = null;

function openAudioDB() {
  return new Promise(function(resolve, reject) {
    if (audioDB) { resolve(audioDB); return; }
    var req = indexedDB.open(AUDIO_DB_NAME, 1);
    req.onupgradeneeded = function(e) {
      var db = e.target.result;
      if (!db.objectStoreNames.contains(AUDIO_STORE)) {
        db.createObjectStore(AUDIO_STORE, { keyPath: 'id' });
      }
    };
    req.onsuccess = function(e) { audioDB = e.target.result; resolve(audioDB); };
    req.onerror = function(e) { reject(e); };
  });
}

function saveAudioBlob(id, name, size, blob) {
  return openAudioDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(AUDIO_STORE, 'readwrite');
      tx.objectStore(AUDIO_STORE).put({ id: id, name: name, size: size, blob: blob });
      tx.oncomplete = resolve;
      tx.onerror = reject;
    });
  });
}

function deleteAudioBlob(id) {
  return openAudioDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(AUDIO_STORE, 'readwrite');
      tx.objectStore(AUDIO_STORE).delete(id);
      tx.oncomplete = resolve;
      tx.onerror = reject;
    });
  });
}

function loadAllAudioBlobs() {
  return openAudioDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(AUDIO_STORE, 'readonly');
      var req = tx.objectStore(AUDIO_STORE).getAll();
      req.onsuccess = function() { resolve(req.result || []); };
      req.onerror = reject;
    });
  });
}

// ── Local File Player ──────────────────────────────────────
const LOCAL_PLAYLIST_KEY = 'ebbinghaus_local_playlist';
let localAudioFiles = [];  // { id, name, size, blob }
let localCurrentIdx = -1;
let localPlaylistMeta = [];  // [{ id, name, size }] — persisted to localStorage

function persistPlaylistMeta() {
  localPlaylistMeta = localAudioFiles.map(function(f) {
    return { id: f.id, name: f.name, size: f.size };
  });
  try { localStorage.setItem(LOCAL_PLAYLIST_KEY, JSON.stringify(localPlaylistMeta)); }
  catch(e) {}
}

function loadPlaylistMeta() {
  try {
    var raw = localStorage.getItem(LOCAL_PLAYLIST_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}

function addLocalFiles(fileList) {
  var newFiles = Array.from(fileList).filter(function(f) {
    return f.type.startsWith('audio/') || /\.(mp3|wav|flac|ogg|aac|m4a)$/i.test(f.name);
  });
  if (newFiles.length === 0) return;

  // Deduplicate by name+size
  var toAdd = [];
  for (var i = 0; i < newFiles.length; i++) {
    var dup = false;
    for (var j = 0; j < localAudioFiles.length; j++) {
      if (localAudioFiles[j].name === newFiles[i].name && localAudioFiles[j].size === newFiles[i].size) {
        dup = true; break;
      }
    }
    if (!dup) toAdd.push(newFiles[i]);
  }
  if (toAdd.length === 0) return;

  // Save to IndexedDB
  var saved = 0;
  var timestamp = Date.now();
  for (var k = 0; k < toAdd.length; k++) {
    (function(file, idx) {
      var id = timestamp + '_' + idx;
      saveAudioBlob(id, file.name, file.size, file).then(function() {
        localAudioFiles.push({ id: id, name: file.name, size: file.size, blob: file });
        saved++;
        if (saved === toAdd.length) finishAdd();
      });
    })(toAdd[k], k);
  }

  function finishAdd() {
    // Sort by name for consistent order
    localAudioFiles.sort(function(a, b) { return a.name.localeCompare(b.name); });
    if (localCurrentIdx < 0) localCurrentIdx = 0;
    persistPlaylistMeta();
    document.getElementById('localPlayer').style.display = localAudioFiles.length > 0 ? '' : 'none';
    renderLocalPlaylist();
    if (localCurrentIdx === 0 && localAudioFiles.length > 0) {
      playLocalFile(0);
    }
  }
}

function handleFileDrop(e) {
  e.preventDefault();
  addLocalFiles(e.dataTransfer.files);
}

function handleFileSelect(e) {
  addLocalFiles(e.target.files);
  e.target.value = '';
}

function playLocalFile(idx) {
  if (idx < 0 || idx >= localAudioFiles.length) return;
  localCurrentIdx = idx;
  const file = localAudioFiles[idx];
  const audio = document.getElementById('musicAudio');
  // Revoke old blob URL if present
  if (audio.src && audio.src.startsWith('blob:')) {
    URL.revokeObjectURL(audio.src);
  }
  const url = URL.createObjectURL(file.blob || file);
  audio.src = url;
  audio.load();
  audio.play().then(function() {
    updatePlayPauseBtn(true);
  }).catch(function() {
    updatePlayPauseBtn(false);
  });
  renderLocalPlaylist();
  updateLocalNowPlaying();
  updateLocalTime();
}

function togglePlayPause() {
  const audio = document.getElementById('musicAudio');
  if (!audio.src) return;
  if (audio.paused) {
    audio.play().then(function() { updatePlayPauseBtn(true); }).catch(function() {});
  } else {
    audio.pause();
    updatePlayPauseBtn(false);
  }
}

function playNext() {
  if (localAudioFiles.length === 0) return;
  var next = (localCurrentIdx + 1) % localAudioFiles.length;
  playLocalFile(next);
}

function playPrev() {
  if (localAudioFiles.length === 0) return;
  var prev = localCurrentIdx <= 0 ? localAudioFiles.length - 1 : localCurrentIdx - 1;
  playLocalFile(prev);
}

function removeFromPlaylist(idx, e) {
  if (e) { e.stopPropagation(); e.preventDefault(); }
  if (idx < 0 || idx >= localAudioFiles.length) return;
  var removed = localAudioFiles[idx];
  var wasPlaying = idx === localCurrentIdx;
  var audio = document.getElementById('musicAudio');

  // Delete from IndexedDB
  deleteAudioBlob(removed.id).catch(function() {});

  localAudioFiles.splice(idx, 1);
  persistPlaylistMeta();

  if (localAudioFiles.length === 0) {
    localCurrentIdx = -1;
    audio.pause();
    audio.src = '';
    document.getElementById('localPlayer').style.display = 'none';
    updatePlayPauseBtn(false);
  } else if (idx < localCurrentIdx) {
    localCurrentIdx--;
    if (wasPlaying) playLocalFile(localCurrentIdx);
  } else if (wasPlaying) {
    if (localCurrentIdx >= localAudioFiles.length) localCurrentIdx = 0;
    playLocalFile(localCurrentIdx);
  }
  renderLocalPlaylist();
  updateLocalNowPlaying();
}

function updatePlayPauseBtn(playing) {
  var btn = document.getElementById('btnPlayPause');
  if (!btn) return;
  btn.innerHTML = playing ? '&#x23F8;' : '&#x25B6;';
  updateVinylState(playing);
}

function updateVinylState(playing) {
  var left = document.getElementById('vinylLeft');
  var right = document.getElementById('vinylRight');
  if (playing) {
    if (left) { left.classList.add('active'); left.classList.add('vinyl-spinning'); }
    if (right) { right.classList.add('active'); right.classList.add('vinyl-spinning'); }
  } else {
    if (left) { left.classList.remove('vinyl-spinning'); left.classList.remove('active'); }
    if (right) { right.classList.remove('vinyl-spinning'); right.classList.remove('active'); }
  }
}

function updateLocalNowPlaying() {
  var el = document.getElementById('localNowPlaying');
  if (!el) return;
  if (localCurrentIdx >= 0 && localCurrentIdx < localAudioFiles.length) {
    el.textContent = localAudioFiles[localCurrentIdx].name;
  } else {
    el.textContent = '未在播放';
  }
}

function updateLocalTime() {
  var el = document.getElementById('localTime');
  var audio = document.getElementById('musicAudio');
  var fill = document.getElementById('localSeekFill');
  if (!el || !audio || !audio.duration || isNaN(audio.duration)) {
    if (el) el.textContent = '--:-- / --:--';
    if (fill) fill.style.width = '0%';
    return;
  }
  var cm = Math.floor(audio.currentTime / 60);
  var cs = Math.floor(audio.currentTime % 60);
  var dm = Math.floor(audio.duration / 60);
  var ds = Math.floor(audio.duration % 60);
  el.textContent = cm + ':' + String(cs).padStart(2, '0') + ' / ' + dm + ':' + String(ds).padStart(2, '0');
  if (fill) fill.style.width = (audio.currentTime / audio.duration * 100) + '%';
}

function seekAudio(e) {
  var wrap = document.getElementById('localSeekWrap');
  var audio = document.getElementById('musicAudio');
  if (!audio || !audio.duration || isNaN(audio.duration)) return;
  var rect = wrap.getBoundingClientRect();
  var pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  audio.currentTime = pct * audio.duration;
  updateLocalTime();
}

function renderLocalPlaylist() {
  var list = document.getElementById('localPlaylist');
  if (!list) return;
  list.innerHTML = localAudioFiles.map(function(f, i) {
    var cls = i === localCurrentIdx ? ' active' : '';
    return '<div class="' + cls + '" onclick="playLocalFile(' + i + ')">' +
      '<span class="pl-name">' + (i + 1) + '. ' + f.name + '</span>' +
      '<span class="pl-del" onclick="removeFromPlaylist(' + i + ',event)" title="移除">&times;</span>' +
    '</div>';
  }).join('');
}

function onMusicAudioEnded() {
  if (localCurrentIdx < localAudioFiles.length - 1) {
    playLocalFile(localCurrentIdx + 1);
  } else {
    updatePlayPauseBtn(false);
  }
}

// ── Music Card UI Controls ─────────────────────────────────
function onMusicToggle() {
  const card = document.getElementById('musicCard');
  card.classList.toggle('open');
  const toggle = card.querySelector('.music-toggle');
  toggle.textContent = card.classList.contains('open') ? '折叠' : '展开';
}

function onMusicTabSwitch(tab) {
  const tabs = document.querySelectorAll('.music-tab');
  tabs.forEach(function(t) { t.classList.remove('active'); });
  tab.classList.add('active');
  var panel = tab.dataset.tab;
  document.getElementById('panelAmbient').style.display = panel === 'ambient' ? '' : 'none';
  document.getElementById('panelLocal').style.display = panel === 'local' ? '' : 'none';
}

function onAmbientTypeChange() {
  var type = document.getElementById('ambientType').value;
  var vol = parseInt(document.getElementById('ambientVolume').value) / 100;
  ambientType = type;
  ambientVolume = vol;
  saveAmbientState({ type: type, volume: vol });
  if (type === 'none') {
    stopAmbient();
    updateMusicCollapsedText();
    return;
  }
  // User gesture from select change unlocks AudioContext
  startAmbient(type, vol);
  updateMusicCollapsedText();
}

function onAmbientVolumeChange() {
  var type = document.getElementById('ambientType').value;
  var vol = parseInt(document.getElementById('ambientVolume').value) / 100;
  ambientVolume = vol;
  saveAmbientState({ type: type, volume: vol });
  if (ambientNodes && ambientNodes.gain) {
    ambientNodes.gain.gain.linearRampToValueAtTime(vol * 0.7, getAudioContext().currentTime + 0.2);
  }
  // Also update local audio volume
  document.getElementById('musicAudio').volume = vol;
}

function updateMusicCollapsedText() {
  var el = document.getElementById('musicCollapsedText');
  var type = document.getElementById('ambientType');
  var labels = { none: '静音', rain: '雨声', white: '白噪音', fire: '篝火' };
  var t = type ? type.value : 'none';
  el.textContent = '🎵 ' + (labels[t] || '背景音乐');
}

// ── Restore ambient state on page load ─────────────────────
function restoreMusicState() {
  var state = loadAmbientState();
  var typeEl = document.getElementById('ambientType');
  var volEl = document.getElementById('ambientVolume');
  if (typeEl) typeEl.value = state.type || 'none';
  if (volEl) volEl.value = Math.round((state.volume || 0.4) * 100);
  ambientType = state.type || 'none';
  ambientVolume = state.volume || 0.4;
  updateMusicCollapsedText();
  // Only auto-start if user selects — browser policy prevents auto-play
}

function restoreLocalFiles() {
  var meta = loadPlaylistMeta();
  if (meta.length === 0) return;
  loadAllAudioBlobs().then(function(records) {
    // Match records to metadata by id
    var recMap = {};
    records.forEach(function(r) { recMap[r.id] = r; });
    localAudioFiles = [];
    for (var i = 0; i < meta.length; i++) {
      var rec = recMap[meta[i].id];
      if (rec && rec.blob) {
        // Reconstruct a File object from the stored blob
        var file = new File([rec.blob], rec.name, { type: rec.blob.type || 'audio/mpeg' });
        localAudioFiles.push({ id: rec.id, name: rec.name, size: rec.size, blob: file });
      }
    }
    if (localAudioFiles.length > 0) {
      localCurrentIdx = 0;
      document.getElementById('localPlayer').style.display = '';
      renderLocalPlaylist();
      // Pre-load first track's src so play/pause works on first click
      var firstFile = localAudioFiles[0].blob;
      var audio = document.getElementById('musicAudio');
      audio.src = URL.createObjectURL(firstFile);
      updateLocalNowPlaying();
      document.getElementById('localNowPlaying').textContent = localAudioFiles[0].name + ' (就绪)';
    }
  }).catch(function() {
    // IndexedDB may not be available
  });
}

function fireStamp() {
  const overlay = document.getElementById('stampOverlay');
  overlay.classList.remove('fire');
  void overlay.offsetWidth;
  overlay.classList.add('fire');
  playStampSound();
  launchFireworks();
}

function launchFireworks() {
  const colors = [
    '#c04040', '#d4745c', '#9b2c2c',
    '#b8935a', '#d4b97c', '#8b6d3b',
    '#3d5a48', '#5c8a6a',
    '#2c3a4a', '#4a637a',
    '#e8c96a', '#d4a84b',
  ];
  const sides = [
    { el: document.getElementById('fireworkLeft'), cx: 100, cy: 200 },
    { el: document.getElementById('fireworkRight'), cx: 100, cy: 180 },
  ];
  const allFrags = [];
  for (const side of sides) {
    const frag = document.createDocumentFragment();
    for (let b = 0; b < 3; b++) {
      const burstCX = side.cx + (Math.random() - 0.5) * 60;
      const burstCY = side.cy + (Math.random() - 0.5) * 80 + b * 100;
      const count = 18 + Math.floor(Math.random() * 14);
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.4;
        const dist = 60 + Math.random() * 140;
        const tx = Math.cos(angle) * dist;
        const ty = Math.sin(angle) * dist;
        const particle = document.createElement('div');
        particle.className = Math.random() < 0.3 ? 'firework-particle spark' : 'firework-particle';
        particle.style.cssText = `
          --tx: ${tx.toFixed(0)}px; --ty: ${ty.toFixed(0)}px;
          --dur: ${(0.8 + Math.random() * 0.9).toFixed(2)}s;
          --delay: ${(b * 0.12 + Math.random() * 0.2).toFixed(2)}s;
          left: ${burstCX.toFixed(0)}px; top: ${burstCY.toFixed(0)}px;
          width: ${(6 + Math.random() * 10).toFixed(0)}px;
          height: ${(6 + Math.random() * 10).toFixed(0)}px;
          background: ${colors[Math.floor(Math.random() * colors.length)]};
        `;
        frag.appendChild(particle);
      }
    }
    side.el.innerHTML = '';
    side.el.appendChild(frag);
    allFrags.push(frag);
  }
  setTimeout(() => {
    for (const side of sides) side.el.innerHTML = '';
  }, 2200);
}

function range(a, b) {
  const arr = [];
  for (let i = a; i <= b; i++) arr.push(i);
  return arr;
}

function generateSchedule(startDateStr, itemsPerDay, totalDays) {
  const startDate = parseLocalDate(startDateStr);
  const schedule = [];
  for (let d = 0; d < totalDays; d++) {
    const date = new Date(startDate.getTime());
    date.setDate(startDate.getDate() + d);
    const newStart = d * itemsPerDay + 1;
    const newEnd = (d + 1) * itemsPerDay;
    const reviews = {};
    for (const I of INTERVALS) {
      const src = d - I;
      reviews[I] = src >= 0 ? range(src * itemsPerDay + 1, (src + 1) * itemsPerDay) : [];
    }
    schedule.push({ dayIndex: d + 1, date, newItems: range(newStart, newEnd), reviews });
  }
  return schedule;
}

function loadState() {
  try {
    let raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      if (data && data.version === 2) return data;
    }
    raw = localStorage.getItem(STORAGE_KEY_LEGACY);
    if (raw) {
      const data = JSON.parse(raw);
      if (data && data.version === 1) {
        return { version: 2, config: data.config, completions: data.completions || {}, contents: {} };
      }
    }
    return null;
  } catch (e) { return null; }
}

function saveState(config, completions, contents) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      version: 2, config, completions: completions || {}, contents: contents || {}
    }));
  } catch (e) { toast('存储空间不足'); }
}

// ── Timer Data ────────────────────────────────────────────
const DURATIONS_KEY = 'ebbinghaus_durations';
const TIMER_KEY = 'ebbinghaus_timer';

function getDateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function loadDurations() {
  try { return JSON.parse(localStorage.getItem(DURATIONS_KEY)) || {}; }
  catch(e) { return {}; }
}

function saveDurations(dur) {
  try { localStorage.setItem(DURATIONS_KEY, JSON.stringify(dur)); }
  catch(e) {}
}

function loadTimerState() {
  try { return JSON.parse(localStorage.getItem(TIMER_KEY)) || null; }
  catch(e) { return null; }
}

function saveTimerState(state) {
  if (state) {
    try { localStorage.setItem(TIMER_KEY, JSON.stringify(state)); }
    catch(e) {}
  } else {
    try { localStorage.removeItem(TIMER_KEY); }
    catch(e) {}
  }
}

let timerInterval = null;
let timerRunning = false;

function formatDuration(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function getTimerElapsed() {
  const state = loadTimerState();
  if (!state || !state.startTime) return 0;
  return Math.floor((Date.now() - state.startTime) / 1000);
}

function updateTimerDisplay() {
  const btn = document.getElementById('btnTimer');
  const elapsed = document.getElementById('timerElapsed');
  if (!btn || !elapsed) return;

  const state = loadTimerState();
  const todayKey = getDateKey(new Date());

  if (state && state.date === todayKey && !state.stopped) {
    // Timer is running
    const sec = getTimerElapsed();
    btn.textContent = '⏱ 复习中';
    btn.className = 'btn-timer running';
    elapsed.textContent = formatDuration(sec);
    elapsed.className = 'timer-elapsed running';
    timerRunning = true;
    startTimerTick();
  } else if (state && state.date === todayKey && state.stopped) {
    // Timer stopped (all completed today)
    btn.textContent = '✓ 复习完成';
    btn.className = 'btn-timer done';
    elapsed.textContent = formatDuration(state.duration || 0);
    elapsed.className = 'timer-elapsed done';
    timerRunning = false;
  } else {
    // No active timer for today
    btn.textContent = '⏱ 开始复习';
    btn.className = 'btn-timer';
    elapsed.textContent = '';
    elapsed.className = 'timer-elapsed';
    timerRunning = false;
  }
}

function startTimer() {
  const todayKey = getDateKey(new Date());
  const state = { startTime: Date.now(), date: todayKey, stopped: false, duration: 0 };
  saveTimerState(state);
  updateTimerDisplay();
  startTimerTick();
}

function stopTimer(duration) {
  const todayKey = getDateKey(new Date());
  const state = { startTime: 0, date: todayKey, stopped: true, duration: duration };
  saveTimerState(state);

  // Save duration
  const durs = loadDurations();
  durs[todayKey] = duration;
  saveDurations(durs);

  updateTimerDisplay();
  stopTimerTick();
}

function startTimerTick() {
  stopTimerTick();
  timerInterval = setInterval(function() {
    const state = loadTimerState();
    if (!state || state.stopped) { stopTimerTick(); updateTimerDisplay(); return; }
    const elapsed = document.getElementById('timerElapsed');
    if (elapsed) elapsed.textContent = formatDuration(getTimerElapsed());
  }, 1000);
}

function stopTimerTick() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function renderTable(schedule, completions, contents) {
  const today = new Date();
  const tbody = document.getElementById('tableBody');
  if (!tbody) return;
  tbody.innerHTML = '';
  let lastMonth = -1;
  const months = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  for (const row of schedule) {
    const m = row.date.getMonth();
    if (m !== lastMonth && lastMonth !== -1) {
      const sep = document.createElement('tr');
      sep.className = 'month-sep';
      sep.innerHTML = `<td colspan="9">&#x2767; &nbsp; ${months[m]} &nbsp; &#x2767;</td>`;
      tbody.appendChild(sep);
    }
    lastMonth = m;
    tbody.appendChild(renderRow(row, completions, contents, today));
  }
}

function renderRow(row, completions, contents, today) {
  const tr = document.createElement('tr');
  if (dateEqual(row.date, today)) tr.className = 'row-today';

  const tdSeq = document.createElement('td');
  tdSeq.textContent = row.dayIndex;
  tdSeq.className = 'col-seq';
  tr.appendChild(tdSeq);

  const tdDate = document.createElement('td');
  tdDate.textContent = formatDate(row.date);
  tdDate.className = 'col-date';
  tr.appendChild(tdDate);

  const tdLearn = document.createElement('td');
  tdLearn.className = 'col-learn';
  tdLearn.appendChild(buildLearnList(row.newItems, contents));
  tr.appendChild(tdLearn);

  for (const I of INTERVALS) {
    const td = document.createElement('td');
    td.className = `col-r${I}`;
    const items = row.reviews[I];
    if (items.length === 0) {
      td.innerHTML = '<span class="cell-empty">&mdash;</span>';
    } else {
      td.appendChild(buildCheckItems(items, I, completions, contents));
    }
    tr.appendChild(td);
  }
  return tr;
}

function buildLearnList(itemIds, contents) {
  const div = document.createElement('div');
  div.className = 'learn-list';
  for (const id of itemIds) {
    const item = document.createElement('div');
    item.className = 'learn-item';
    item.innerHTML = `<span class="idx">${id}.</span>
      <span class="txt ${contents[id] ? '' : 'empty'}">${contents[id] || '点击输入内容…'}</span>`;
    item.addEventListener('click', () => startInlineEdit(item, id, contents));
    div.appendChild(item);
  }
  return div;
}

function startInlineEdit(itemEl, id, contents) {
  const txtSpan = itemEl.querySelector('.txt');
  const current = contents[id] || '';
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'learn-edit';
  input.value = current;
  input.placeholder = '输入背诵内容…';
  txtSpan.replaceWith(input);
  input.focus();
  input.select();
  const commit = () => {
    const val = input.value.trim();
    if (val) { contents[id] = val; }
    else { delete contents[id]; }
    saveState(currentConfig, currentCompletions, contents);
    const newSpan = document.createElement('span');
    newSpan.className = `txt ${val ? '' : 'empty'}`;
    newSpan.textContent = val || '点击输入内容…';
    input.replaceWith(newSpan);
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') input.blur();
    if (e.key === 'Escape') { input.value = current; input.blur(); }
  });
}

function buildCheckItems(itemIds, interval, completions, contents) {
  const div = document.createElement('div');
  div.className = 'check-items';
  let allDone = true;
  for (const id of itemIds) {
    const key = `${id}_${interval}`;
    const done = !!completions[key];
    if (!done) allDone = false;
    const tipAttr = contents[id] ? ` data-tip="${escapeAttr(contents[id])}"` : '';
    const wrap = document.createElement('span');
    wrap.className = 'check-item';
    wrap.innerHTML = `<input type="checkbox" id="cb_${key}" data-item="${id}" data-interval="${interval}" ${done ? 'checked' : ''}>
      <label for="cb_${key}"${tipAttr}>${id}</label>`;
    div.appendChild(wrap);
  }
  if (allDone && itemIds.length > 0) div.classList.add('cell-done');
  return div;
}

function escapeAttr(s) {
  return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderContentPanel(schedule, contents) {
  const body = document.getElementById('contentPanelBody');
  body.innerHTML = '';
  for (const row of schedule) {
    const dayEl = document.createElement('div');
    dayEl.className = 'day-group';
    const title = document.createElement('div');
    title.className = 'day-group-title';
    title.textContent = `Day ${String(row.dayIndex).padStart(2,'0')} — ${formatDate(row.date)}`;
    title.style.cursor = 'pointer';
    dayEl.appendChild(title);
    const itemsDiv = document.createElement('div');
    itemsDiv.className = 'day-items';
    for (const id of row.newItems) {
      const itemRow = document.createElement('div');
      itemRow.className = 'item-row';
      itemRow.innerHTML = `<span class="item-num">${id}</span>
        <input type="text" data-item="${id}" value="${escapeAttr(contents[id] || '')}" placeholder="输入背诵内容…">`;
      itemsDiv.appendChild(itemRow);
    }
    dayEl.appendChild(itemsDiv);
    body.appendChild(dayEl);
    title.addEventListener('click', () => {
      itemsDiv.style.display = itemsDiv.style.display === 'none' ? '' : 'none';
    });
  }
  const debouncedSave = debounce(() => {
    body.querySelectorAll('input[data-item]').forEach(inp => {
      const id = parseInt(inp.dataset.item, 10);
      const val = inp.value.trim();
      if (val) { contents[id] = val; }
      else { delete contents[id]; }
    });
    saveState(currentConfig, currentCompletions, contents);
    const sched = generateSchedule(currentConfig.startDate, currentConfig.itemsPerDay, currentConfig.totalDays);
    renderTable(sched, currentCompletions, contents);
  }, 400);
  body.addEventListener('input', e => {
    if (e.target.dataset.item) debouncedSave();
  });
}

function debounce(fn, ms) {
  let timer;
  return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), ms); };
}

function computeStreak(schedule, completions) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const completeMap = new Map();
  let latestPastDay = 0;

  for (const row of schedule) {
    const d = new Date(row.date);
    d.setHours(0, 0, 0, 0);
    if (d > today) continue;
    let total = 0, done = 0;
    for (const I of INTERVALS) {
      for (const id of row.reviews[I]) {
        total++;
        if (completions[id + '_' + I]) done++;
      }
    }
    completeMap.set(row.dayIndex, total > 0 && done === total);
    if (row.dayIndex > latestPastDay) latestPastDay = row.dayIndex;
  }

  let start = latestPastDay;
  if (start > 0 && !completeMap.get(start)) start = start - 1;

  let streak = 0;
  for (let d = start; d >= 1; d--) {
    if (completeMap.get(d) === true) streak++;
    else break;
  }
  return streak;
}

function updateStats(schedule, completions) {
  let total = 0, done = 0;
  for (const row of schedule)
    for (const I of INTERVALS)
      for (const id of row.reviews[I]) {
        total++;
        if (completions[id + '_' + I]) done++;
      }
  const pct = total === 0 ? 0 : Math.round(done / total * 100);
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statPct').textContent = pct + '%';
  document.getElementById('statBar').style.width = pct + '%';
  document.getElementById('statTime').textContent = new Date().toLocaleString('zh-CN');
  document.getElementById('stats').style.display = total > 0 ? 'flex' : 'none';

  const streak = computeStreak(schedule, completions);
  const badge = document.getElementById('streakBadge');
  const numEl = document.getElementById('streakNum');
  const prevStreak = parseInt(numEl.textContent, 10) || 0;
  badge.style.display = 'flex';
  badge.style.opacity = streak > 0 ? '1' : '0.4';
  numEl.textContent = streak;
  if (streak > prevStreak) {
    badge.classList.remove('pulse');
    void badge.offsetWidth;
    badge.classList.add('pulse');
  }
}

let currentConfig = null;
let currentCompletions = null;
let currentContents = null;

function onGenerate() {
  const startDateStr = document.getElementById('startDate').value;
  const itemsPerDay = parseInt(document.getElementById('itemsPerDay').value, 10);
  const totalDays = parseInt(document.getElementById('totalDays').value, 10);
  if (!startDateStr) { toast('请选择开始日期'); return; }
  if (itemsPerDay < 1 || itemsPerDay > 200) { toast('每日项数为 1-200'); return; }
  if (totalDays < 1 || totalDays > 365) { toast('天数为 1-365'); return; }
  const prev = loadState();
  if (prev && prev.config) {
    const pc = prev.config;
    if ((pc.startDate !== startDateStr || pc.itemsPerDay !== itemsPerDay) &&
        !confirm('修改起始日期或每日项数将重新生成计划，已完成标记可能部分丢失。是否继续？')) return;
  }
  const schedule = generateSchedule(startDateStr, itemsPerDay, totalDays);
  const newCompletions = {}, newContents = {};
  if (prev) {
    for (const row of schedule) {
      for (const I of INTERVALS)
        for (const id of row.reviews[I]) {
          const key = `${id}_${I}`;
          if (prev.completions && prev.completions[key]) newCompletions[key] = true;
        }
    }
    if (prev.contents)
      for (const row of schedule)
        for (const id of row.newItems)
          if (prev.contents[id]) newContents[id] = prev.contents[id];
  }
  currentConfig = { startDate: startDateStr, itemsPerDay, totalDays };
  currentCompletions = newCompletions;
  currentContents = newContents;
  buildTableShell();
  renderTable(schedule, newCompletions, newContents);
  renderContentPanel(schedule, newContents);
  updateStats(schedule, newCompletions);
  saveState(currentConfig, newCompletions, newContents);
  showAfterGenerate();
}

function isTodayComplete(schedule, completions) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  let bestRow = null;
  for (const row of schedule) {
    const d = new Date(row.date); d.setHours(0, 0, 0, 0);
    if (d.getTime() === today.getTime()) { bestRow = row; break; }
    if (d <= today && (!bestRow || d > new Date(bestRow.date))) bestRow = row;
  }
  if (!bestRow) return false;
  let total = 0, done = 0;
  for (const I of INTERVALS) {
    for (const id of bestRow.reviews[I]) {
      total++;
      if (completions[id + '_' + I]) done++;
    }
  }
  return total > 0 && done === total;
}

function onCheckbox(e) {
  const el = e.target;
  if (el.tagName !== 'INPUT' || !el.dataset.item) return;
  const s = generateSchedule(currentConfig.startDate, currentConfig.itemsPerDay, currentConfig.totalDays);
  const wasTodayComplete = isTodayComplete(s, currentCompletions);
  currentCompletions[`${el.dataset.item}_${el.dataset.interval}`] = el.checked;
  saveState(currentConfig, currentCompletions, currentContents);
  const fromOverview = !!el.closest('#todayOverview');
  const other = fromOverview ? document.getElementById('tableWrap') : document.getElementById('todayOverview');
  if (other) {
    const twin = other.querySelector(`input[data-item="${el.dataset.item}"][data-interval="${el.dataset.interval}"]`);
    if (twin) twin.checked = el.checked;
  }
  if (!fromOverview) {
    const cell = el.closest('.check-items');
    if (cell) {
      const allChecked = [...cell.querySelectorAll('input')].every(cb => cb.checked);
      cell.classList.toggle('cell-done', allChecked);
    }
  }
  if (fromOverview && other) {
    const twinCell = other.querySelector(`input[data-item="${el.dataset.item}"][data-interval="${el.dataset.interval}"]`)?.closest('.check-items');
    if (twinCell) {
      const allChecked = [...twinCell.querySelectorAll('input')].every(cb => cb.checked);
      twinCell.classList.toggle('cell-done', allChecked);
    }
  }
  const contentItem = el.closest('.today-content-item');
  if (contentItem) contentItem.classList.toggle('done', el.checked);

  updateStats(s, currentCompletions);
  if (document.getElementById('todayOverview').classList.contains('open')) {
    if (fromOverview) {
      const overview = document.getElementById('todayOverview');
      const cbs = overview.querySelectorAll('input[data-item]');
      let t = 0, d = 0;
      cbs.forEach(cb => { t++; if (cb.checked) d++; });
      const pct = t === 0 ? 0 : Math.round(d / t * 100);
      document.getElementById('todayProgressText').textContent = t === 0 ? '今日暂无复习任务' : `已完成 ${d} / ${t}`;
      document.getElementById('todayBar').style.width = pct + '%';

      // Update per-group progress in accordion header
      const group = el.closest('.today-review-group');
      if (group) {
        const groupCbs = group.querySelectorAll('input[data-item]');
        let gd = 0;
        groupCbs.forEach(cb => { if (cb.checked) gd++; });
        const progEl = group.querySelector('.today-review-progress');
        if (progEl) progEl.textContent = `${gd}/${groupCbs.length}`;

        // Auto-advance: if group fully done, collapse it and open next incomplete
        if (gd === groupCbs.length) {
          group.classList.remove('open');
          const allGroups = [...overview.querySelectorAll('.today-review-group')];
          for (const g of allGroups) {
            if (g === group) continue;
            const gCbs = g.querySelectorAll('input[data-item]');
            let gDone = 0;
            gCbs.forEach(cb => { if (cb.checked) gDone++; });
            if (gDone < gCbs.length) {
              g.classList.add('open');
              break;
            }
          }
        }
      }
    } else {
      renderTodayOverview(s, currentCompletions, currentContents);
    }
  }
  if (el.checked && !wasTodayComplete && isTodayComplete(s, currentCompletions)) {
    // Auto-stop timer if running
    const timerState = loadTimerState();
    if (timerState && !timerState.stopped) {
      const sec = getTimerElapsed();
      stopTimer(sec);
    }
    fireStamp();
  }
}

function renderTodayOverview(schedule, completions, contents) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  let todayRow = null;
  for (const row of schedule) {
    const d = new Date(row.date);
    d.setHours(0, 0, 0, 0);
    if (d.getTime() === today.getTime()) { todayRow = row; break; }
  }
  const overview = document.getElementById('todayOverview');
  if (!todayRow) { overview.classList.remove('open'); return; }
  overview.classList.add('open');
  document.getElementById('todayDateLabel').textContent = formatDate(todayRow.date);

  const grid = document.getElementById('todayGrid');
  grid.innerHTML = '';

  let animIdx = 0;

  const newSection = document.createElement('div');
  newSection.className = 'today-section';
  newSection.innerHTML = '<h4>今日背诵</h4>';
  const newList = document.createElement('div');
  newList.className = 'today-item-list';
  for (const id of todayRow.newItems) {
    const itemRow = document.createElement('div');
    itemRow.className = 'today-content-item';
    itemRow.style.animationDelay = (animIdx++ * 50) + 'ms';
    itemRow.innerHTML = `
      <span class="today-item-num">${id}</span>
      <span class="today-item-text ${contents[id] ? '' : 'empty'}">${contents[id] || '点击「编辑内容」添加背诵内容'}</span>
    `;
    newList.appendChild(itemRow);
  }
  newSection.appendChild(newList);
  grid.appendChild(newSection);

  const revSection = document.createElement('div');
  revSection.className = 'today-section';
  revSection.innerHTML = '<h4>待复习</h4>';

  const INTERVAL_LABELS = { 1:'1 天前学过', 2:'2 天前学过', 4:'4 天前学过', 7:'7 天前学过', 15:'15 天前学过', 30:'30 天前学过' };
  let todayTotal = 0, todayDone = 0;
  let firstIncompleteFound = false;

  for (const I of INTERVALS) {
    const items = todayRow.reviews[I] || [];
    if (items.length === 0) continue;

    let groupDone = 0;
    const groupItems = [];
    for (const id of items) {
      todayTotal++;
      const key = id + '_' + I;
      const done = !!completions[key];
      if (done) { todayDone++; groupDone++; }
      groupItems.push({ id, I, done });
    }

    const groupTotal = items.length;
    const groupAllDone = groupDone === groupTotal;
    // Expand first incomplete group; if all complete, expand none
    const open = !firstIncompleteFound && !groupAllDone;
    if (open) firstIncompleteFound = true;

    const group = document.createElement('div');
    group.className = 'today-review-group' + (open ? ' open' : '');

    group.innerHTML = `
      <div class="today-review-header">
        <span class="today-review-arrow">&#x25B6;</span>
        <span class="today-interval-tag i${I}">${I}天</span>
        <span class="today-review-label">${INTERVAL_LABELS[I]}</span>
        <span class="today-review-progress" data-group="${I}">${groupDone}/${groupTotal}</span>
      </div>
      <div class="today-review-body">
        <div class="today-item-list"></div>
      </div>
    `;

    const innerList = group.querySelector('.today-item-list');
    for (const gi of groupItems) {
      const itemRow = document.createElement('div');
      itemRow.className = 'today-content-item' + (gi.done ? ' done' : '');
      itemRow.style.animationDelay = (animIdx++ * 50) + 'ms';
      itemRow.innerHTML = `
        <label class="today-check-label">
          <input type="checkbox" data-item="${gi.id}" data-interval="${gi.I}" ${gi.done ? 'checked' : ''}>
          <span class="today-check-mark"></span>
        </label>
        <span class="today-item-num">${gi.id}</span>
        <span class="today-item-text ${contents[gi.id] ? '' : 'empty'}">${contents[gi.id] || '未设置内容'}</span>
      `;
      innerList.appendChild(itemRow);
    }

    revSection.appendChild(group);
  }
  grid.appendChild(revSection);

  const todayPct = todayTotal === 0 ? 0 : Math.round(todayDone / todayTotal * 100);
  document.getElementById('todayProgressText').textContent =
    todayTotal === 0 ? '今日暂无复习任务' : `已完成 ${todayDone} / ${todayTotal}`;
  document.getElementById('todayBar').style.width = todayPct + '%';
  updateTimerDisplay();
}

function onToggleFocus() {
  const wrap = document.getElementById('tableWrap');
  const btn = document.getElementById('btnTodayFocus');
  const active = !wrap.classList.contains('focus-mode');
  if (active) {
    const s = generateSchedule(currentConfig.startDate, currentConfig.itemsPerDay, currentConfig.totalDays);
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const hasToday = s.some(row => {
      const d = new Date(row.date); d.setHours(0, 0, 0, 0);
      return d.getTime() === today.getTime();
    });
    if (!hasToday) {
      const first = s[0], last = s[s.length - 1];
      if (today < new Date(first.date)) { toast('计划尚未开始'); return; }
      if (today > new Date(last.date)) { toast('计划已结束'); return; }
      toast('今日不在计划范围内'); return;
    }
    wrap.classList.add('focus-mode');
    renderTodayOverview(s, currentCompletions, currentContents);
    const overview = document.getElementById('todayOverview');
    if (overview) overview.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } else {
    wrap.classList.remove('focus-mode');
    document.getElementById('todayOverview').classList.remove('open');
  }
  btn.classList.toggle('active', active);
  btn.innerHTML = active ? '&#x25C9; 今日焦点 (开)' : '&#x25C9; 今日焦点';
}

let notifyEnabled = false;
let notifyTimer = null;
const NOTIFY_STORAGE = 'ebbinghaus_notify';

function loadNotifyState() {
  try {
    const raw = localStorage.getItem(NOTIFY_STORAGE);
    return raw ? JSON.parse(raw) : { enabled: false, time: '09:00', lastNotified: '' };
  } catch(e) { return { enabled: false, time: '09:00', lastNotified: '' }; }
}

function saveNotifyState(state) {
  try { localStorage.setItem(NOTIFY_STORAGE, JSON.stringify(state)); } catch(e) {}
}

function requestNotifyPermission() {
  if (!('Notification' in window)) return false;
  if (Notification.permission === 'granted') return true;
  if (Notification.permission === 'denied') return false;
  Notification.requestPermission().then(p => {
    if (p === 'granted') toast('通知已开启');
    else toast('通知被拒绝，请在浏览器设置中允许');
  });
  return false;
}

function sendNotification(schedule, completions) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const today = new Date(); today.setHours(0, 0, 0, 0);
  let todayRow = null;
  for (const row of schedule) {
    const d = new Date(row.date); d.setHours(0, 0, 0, 0);
    if (d.getTime() === today.getTime()) { todayRow = row; break; }
  }
  if (!todayRow) return;
  let total = 0, done = 0;
  for (const I of INTERVALS) {
    for (const id of todayRow.reviews[I]) {
      total++;
      if (completions[`${id}_${I}`]) done++;
    }
  }
  const remaining = total - done;
  const body = remaining === 0
    ? '今日复习已全部完成！继续保持！'
    : `还有 ${remaining} 项待复习（共 ${total} 项），别忘了哦。`;
  new Notification('艾宾浩斯背诵提醒', { body, icon: '', silent: false });
}

function checkAndNotify() {
  if (!notifyEnabled) return;
  if (!currentConfig) return;
  const state = loadNotifyState();
  if (state.time !== document.getElementById('notifyTime').value) {
    state.time = document.getElementById('notifyTime').value;
    saveNotifyState(state);
  }
  const now = new Date();
  const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  if (state.lastNotified === todayStr) return;
  const [h, m] = state.time.split(':').map(Number);
  if (now.getHours() === h && now.getMinutes() >= m && now.getMinutes() < m + 5) {
    const s = generateSchedule(currentConfig.startDate, currentConfig.itemsPerDay, currentConfig.totalDays);
    sendNotification(s, currentCompletions);
    state.lastNotified = todayStr;
    saveNotifyState(state);
  }
}

function startNotifyTimer() {
  if (notifyTimer) clearInterval(notifyTimer);
  notifyTimer = setInterval(checkAndNotify, 45000);
}

function onToggleNotify() {
  const btn = document.getElementById('btnNotify');
  if (!notifyEnabled) {
    const granted = Notification.permission === 'granted';
    if (!granted && Notification.permission !== 'denied') {
      Notification.requestPermission().then(p => {
        if (p === 'granted') {
          enableNotify();
          toast('每日提醒已开启');
        } else {
          toast('需要允许通知权限才能使用提醒功能');
        }
      });
      return;
    }
    if (Notification.permission === 'denied') {
      toast('通知已被浏览器阻止，请在地址栏左侧的网站设置中开启');
      return;
    }
    enableNotify();
    toast('每日提醒已开启');
  } else {
    notifyEnabled = false;
    btn.classList.remove('active');
    btn.innerHTML = '&#x1F514; 每日提醒';
    const state = loadNotifyState();
    state.enabled = false;
    saveNotifyState(state);
    toast('每日提醒已关闭');
  }
}

function enableNotify() {
  notifyEnabled = true;
  const btn = document.getElementById('btnNotify');
  btn.classList.add('active');
  btn.innerHTML = '&#x1F514; 每日提醒 (开)';
  const state = loadNotifyState();
  state.enabled = true;
  state.time = document.getElementById('notifyTime').value;
  saveNotifyState(state);
  startNotifyTimer();
}

function onToggle() {
  const wrap = document.getElementById('tableWrap');
  const btn = document.getElementById('btnToggle');
  const collapsed = wrap.classList.toggle('collapsed');
  btn.textContent = collapsed ? '全部展开' : '全部折叠';
  const d = collapsed ? 'none' : '';
  wrap.querySelectorAll('.col-r1,.col-r2,.col-r4,.col-r7,.col-r15,.col-r30').forEach(td => td.style.display = d);
  wrap.querySelectorAll('th:nth-child(n+4)').forEach(th => th.style.display = d);
}

function onClear() {
  if (confirm('确定要清空所有复习完成标记吗？此操作不可撤销。')) {
    currentCompletions = {};
    saveState(currentConfig, currentCompletions, currentContents);
    const s = generateSchedule(currentConfig.startDate, currentConfig.itemsPerDay, currentConfig.totalDays);
    renderTable(s, currentCompletions, currentContents);
    updateStats(s, currentCompletions);
    if (document.getElementById('todayOverview').classList.contains('open')) {
      renderTodayOverview(s, currentCompletions, currentContents);
    }
    toast('已清空所有标记');
  }
}

function renderStatsModal() {
  const body = document.getElementById('statsModalBody');
  const durs = loadDurations();
  const keys = Object.keys(durs).sort();
  if (keys.length === 0) {
    body.innerHTML = '<div class="stats-empty">暂无复习时长记录<br><small>开始复习并完成当日任务后将自动记录</small></div>';
    return;
  }
  let totalSec = 0;
  let html = '<table class="stats-table"><thead><tr><th>日期</th><th class="dur-col">时长</th></tr></thead><tbody>';
  for (const k of keys) {
    const sec = durs[k];
    totalSec += sec;
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    const durStr = m > 0 ? `${m} 分 ${s} 秒` : `${s} 秒`;
    html += `<tr><td>${k}</td><td class="dur-col">${durStr}</td></tr>`;
  }
  const tm = Math.floor(totalSec / 60);
  const ts = totalSec % 60;
  const totalStr = tm > 0 ? `${tm} 分 ${ts} 秒` : `${ts} 秒`;
  html += `<tr class="cumulative-row"><td>累计</td><td class="dur-col">${totalStr}</td></tr>`;
  html += '</tbody></table>';
  body.innerHTML = html;
}

function onExport() {
  const data = {
    schedule: loadState(),
    durations: loadDurations(),
    exportedAt: new Date().toISOString()
  };
  document.getElementById('dataModalTitle').textContent = '导出数据';
  document.getElementById('dataModalBody').innerHTML = `
    <p style="margin-bottom:10px;color:var(--faded-ink);font-size:13px;">复制下方全部内容，在另一台设备上点击「导入数据」粘贴即可。</p>
    <textarea id="exportTextarea" readonly style="width:100%;height:180px;font-family:'JetBrains Mono',monospace;font-size:11px;padding:10px;border:1px solid rgba(125,94,16,0.3);border-radius:2px;background:rgba(255,255,255,0.5);color:var(--iron-gall-ink);resize:vertical;"
    >${JSON.stringify(data, null, 2)}</textarea>
    <button class="btn btn-primary btn-sm" id="btnCopyExport" style="margin-top:10px;">复制到剪贴板</button>
  `;
  document.getElementById('dataModalOverlay').classList.add('open');
  document.getElementById('btnCopyExport').addEventListener('click', function() {
    const ta = document.getElementById('exportTextarea');
    ta.select();
    document.execCommand('copy');
    navigator.clipboard.writeText(ta.value).catch(() => {});
    toast('已复制到剪贴板');
  });
}

function onImport() {
  document.getElementById('dataModalTitle').textContent = '导入数据';
  document.getElementById('dataModalBody').innerHTML = `
    <p style="margin-bottom:10px;color:var(--faded-ink);font-size:13px;">粘贴之前导出的数据，然后点击「导入」。</p>
    <textarea id="importTextarea" placeholder="在此粘贴数据..." style="width:100%;height:180px;font-family:'JetBrains Mono',monospace;font-size:11px;padding:10px;border:1px solid rgba(125,94,16,0.3);border-radius:2px;background:rgba(255,255,255,0.5);color:var(--iron-gall-ink);resize:vertical;"
    ></textarea>
    <div style="display:flex;gap:8px;margin-top:10px;">
      <button class="btn btn-primary btn-sm" id="btnDoImport">导入</button>
      <span style="font-size:11px;color:var(--red-ink);line-height:2.2;">导入会覆盖当前所有数据，请谨慎操作</span>
    </div>
  `;
  document.getElementById('dataModalOverlay').classList.add('open');
  document.getElementById('btnDoImport').addEventListener('click', function() {
    const raw = document.getElementById('importTextarea').value.trim();
    if (!raw) { toast('请先粘贴数据'); return; }
    try {
      const data = JSON.parse(raw);
      if (data.schedule && data.schedule.config) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data.schedule));
      }
      if (data.durations) {
        localStorage.setItem(DURATIONS_KEY, JSON.stringify(data.durations));
      }
      document.getElementById('dataModalOverlay').classList.remove('open');
      toast('导入成功，请刷新页面');
      setTimeout(function() { location.reload(); }, 800);
    } catch(e) {
      toast('数据格式错误，请检查');
    }
  });
}

function onSaveContent() {
  document.getElementById('contentPanelBody').querySelectorAll('input[data-item]').forEach(inp => {
    const id = parseInt(inp.dataset.item, 10);
    const val = inp.value.trim();
    if (val) currentContents[id] = val; else delete currentContents[id];
  });
  saveState(currentConfig, currentCompletions, currentContents);
  const s = generateSchedule(currentConfig.startDate, currentConfig.itemsPerDay, currentConfig.totalDays);
  renderTable(s, currentCompletions, currentContents);
  if (document.getElementById('todayOverview').classList.contains('open')) {
    renderTodayOverview(s, currentCompletions, currentContents);
  }
  toast('内容已保存');
}

function onCollapseAllGroups() {
  const all = document.getElementById('contentPanelBody').querySelectorAll('.day-items');
  const allVisible = [...all].every(d => d.style.display !== 'none');
  all.forEach(d => { d.style.display = allVisible ? 'none' : ''; });
  document.getElementById('btnCollapseAllGroups').textContent = allVisible ? '展开全部' : '折叠全部';
}

function init() {
  const today = new Date();
  document.getElementById('startDate').value =
    `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const saved = loadState();
  if (saved && saved.config) {
    const c = saved.config;
    document.getElementById('startDate').value = c.startDate;
    document.getElementById('itemsPerDay').value = c.itemsPerDay;
    document.getElementById('totalDays').value = c.totalDays;
    currentConfig = c;
    currentCompletions = saved.completions || {};
    currentContents = saved.contents || {};
    const schedule = generateSchedule(c.startDate, c.itemsPerDay, c.totalDays);
    buildTableShell();
    renderTable(schedule, currentCompletions, currentContents);
    renderContentPanel(schedule, currentContents);
    updateStats(schedule, currentCompletions);
    showAfterGenerate();
  }
  document.getElementById('btnGenerate').addEventListener('click', onGenerate);
  document.getElementById('btnToggle').addEventListener('click', onToggle);
  document.getElementById('btnTodayFocus').addEventListener('click', onToggleFocus);
  document.getElementById('btnClear').addEventListener('click', onClear);
  document.getElementById('btnEditContent').addEventListener('click', () => {
    document.getElementById('contentPanel').scrollIntoView({ behavior: 'smooth' });
  });
  document.getElementById('btnSaveContent').addEventListener('click', onSaveContent);
  document.getElementById('btnCollapseAllGroups').addEventListener('click', onCollapseAllGroups);
  document.getElementById('tableWrap').addEventListener('change', onCheckbox);
  document.getElementById('todayOverview').addEventListener('change', onCheckbox);
  document.getElementById('todayOverview').addEventListener('click', function(e) {
    const header = e.target.closest('.today-review-header');
    if (!header) return;
    const group = header.closest('.today-review-group');
    if (!group) return;
    group.classList.toggle('open');
  });
  document.getElementById('btnTimer').addEventListener('click', function() {
    const state = loadTimerState();
    const todayKey = getDateKey(new Date());
    if (state && state.date === todayKey && !state.stopped) return; // already running
    if (state && state.date === todayKey && state.stopped) return; // already done
    startTimer();
  });
  document.getElementById('btnStats').addEventListener('click', function() {
    renderStatsModal();
    document.getElementById('statsModalOverlay').classList.add('open');
  });
  document.getElementById('statsModalClose').addEventListener('click', function() {
    document.getElementById('statsModalOverlay').classList.remove('open');
  });
  document.getElementById('statsModalOverlay').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });
  document.getElementById('btnExport').addEventListener('click', onExport);
  document.getElementById('btnImport').addEventListener('click', onImport);
  document.getElementById('dataModalClose').addEventListener('click', function() {
    document.getElementById('dataModalOverlay').classList.remove('open');
  });
  document.getElementById('dataModalOverlay').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });
  // Music card
  document.getElementById('musicHeader').addEventListener('click', onMusicToggle);
  document.querySelectorAll('.music-tab').forEach(function(tab) {
    tab.addEventListener('click', function() { onMusicTabSwitch(tab); });
  });
  document.getElementById('ambientType').addEventListener('change', onAmbientTypeChange);
  document.getElementById('ambientVolume').addEventListener('input', onAmbientVolumeChange);
  // Local file handlers
  var dropzone = document.getElementById('musicDropzone');
  dropzone.addEventListener('dragover', function(e) { e.preventDefault(); dropzone.classList.add('dragover'); });
  dropzone.addEventListener('dragleave', function() { dropzone.classList.remove('dragover'); });
  dropzone.addEventListener('drop', function(e) { dropzone.classList.remove('dragover'); handleFileDrop(e); });
  document.getElementById('btnBrowseFiles').addEventListener('click', function() {
    document.getElementById('musicFileInput').click();
  });
  document.getElementById('musicFileInput').addEventListener('change', handleFileSelect);
  document.getElementById('musicAudio').addEventListener('ended', onMusicAudioEnded);
  document.getElementById('musicAudio').addEventListener('timeupdate', updateLocalTime);
  document.getElementById('musicAudio').addEventListener('play', function() { updatePlayPauseBtn(true); });
  document.getElementById('musicAudio').addEventListener('pause', function() { updatePlayPauseBtn(false); });
  document.getElementById('btnPlayPause').addEventListener('click', togglePlayPause);
  document.getElementById('btnPrev').addEventListener('click', playPrev);
  document.getElementById('btnNext').addEventListener('click', playNext);
  document.getElementById('localVolume').addEventListener('input', function() {
    document.getElementById('musicAudio').volume = parseInt(this.value) / 100;
  });
  // Seek bar — click to seek
  var seekWrap = document.getElementById('localSeekWrap');
  seekWrap.addEventListener('click', seekAudio);
  // Seek bar — drag to seek
  var dragging = false;
  seekWrap.addEventListener('mousedown', function(e) {
    dragging = true;
    seekAudio(e);
  });
  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    seekAudio(e);
  });
  document.addEventListener('mouseup', function() { dragging = false; });
  // Restore state
  restoreMusicState();
  restoreLocalFiles();

  document.getElementById('btnNotify').addEventListener('click', onToggleNotify);
  document.getElementById('notifyTime').addEventListener('change', function() {
    if (notifyEnabled) {
      const state = loadNotifyState();
      state.time = this.value;
      saveNotifyState(state);
    }
  });
  const ns = loadNotifyState();
  if (ns.enabled && 'Notification' in window && Notification.permission === 'granted') {
    document.getElementById('notifyTime').value = ns.time;
    notifyEnabled = true;
    document.getElementById('btnNotify').classList.add('active');
    document.getElementById('btnNotify').innerHTML = '&#x1F514; 每日提醒 (开)';
    startNotifyTimer();
  } else if (ns.enabled) {
    document.getElementById('notifyTime').value = ns.time;
    ns.enabled = false;
    saveNotifyState(ns);
  }
  document.querySelectorAll('.field input').forEach(inp => {
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') onGenerate(); });
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
