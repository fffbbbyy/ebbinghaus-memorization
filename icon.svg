<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2dfb8"/>
      <stop offset="100%" stop-color="#d9bd7a"/>
    </linearGradient>
  </defs>
  <!-- Parchment circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)" stroke="#7d5e10" stroke-width="12"/>
  <circle cx="256" cy="256" r="230" fill="none" stroke="#a3780a" stroke-width="2" opacity="0.5"/>
  <!-- Inner vermillion ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#a03030" stroke-width="4" opacity="0.4"/>
  <circle cx="256" cy="256" r="195" fill="none" stroke="#a03030" stroke-width="1" opacity="0.25"/>
  <!-- Characters: 记 忆 曲 线 -->
  <text x="256" y="190" text-anchor="middle" font-family="serif" font-size="72" font-weight="900" fill="#111122">记忆</text>
  <text x="256" y="275" text-anchor="middle" font-family="serif" font-size="72" font-weight="900" fill="#111122">曲线</text>
  <!-- Decorative dots -->
  <circle cx="256" cy="340" r="6" fill="#a3780a"/>
  <!-- Ornament line -->
  <line x1="180" y1="370" x2="332" y2="370" stroke="#7d5e10" stroke-width="2" opacity="0.5"/>
  <line x1="200" y1="378" x2="312" y2="378" stroke="#7d5e10" stroke-width="1" opacity="0.3"/>
</svg>
